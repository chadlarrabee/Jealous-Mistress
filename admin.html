<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — The Jealous Mistress</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:  #0a1628;
      --deep:  #060e1a;
      --brass: #c9932a;
      --gold:  #e8b84b;
      --cream: #f0e6d0;
      --fog:   #a8b8c8;
      --rope:  #7a6040;
    }

    html, body { height: 100%; background: var(--deep); color: var(--cream); font-family: 'Crimson Text', serif; overflow-x: hidden; }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 20% 80%, rgba(10,22,40,0.9) 0%, transparent 60%),
        linear-gradient(180deg, #060e1a 0%, #0a1628 40%, #0d1e35 100%);
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed; top: 0; left: 0; right: 0; height: 6px;
      background: repeating-linear-gradient(90deg,
        var(--brass) 0px, var(--brass) 8px, var(--rope) 8px, var(--rope) 16px,
        var(--gold) 16px, var(--gold) 20px, var(--rope) 20px, var(--rope) 28px);
      z-index: 100;
    }

    /* ── Login ── */
    #loginScreen {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 40px 24px;
    }

    .login-box {
      background: linear-gradient(145deg, rgba(15,28,50,0.95), rgba(10,22,40,0.98));
      border: 1px solid rgba(201,147,42,0.3);
      border-radius: 4px;
      padding: 48px 40px;
      width: 100%; max-width: 360px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    }

    .login-title {
      font-family: 'Cinzel', serif;
      font-size: 1rem; letter-spacing: 0.25em;
      color: var(--gold); text-transform: uppercase; margin-bottom: 6px;
    }

    .login-sub {
      font-style: italic; color: var(--fog); font-size: 0.9rem; margin-bottom: 32px;
    }

    .login-input {
      width: 100%; padding: 13px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(201,147,42,0.3); border-radius: 3px;
      color: var(--cream); font-family: 'Crimson Text', serif;
      font-size: 1rem; outline: none; margin-bottom: 14px;
      transition: border-color 0.3s;
    }
    .login-input:focus { border-color: var(--gold); }
    .login-input::placeholder { color: rgba(168,184,200,0.4); }

    .login-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--brass), var(--gold));
      border: none; border-radius: 3px;
      color: var(--deep); font-family: 'Cinzel', serif;
      font-size: 0.85rem; font-weight: 600; letter-spacing: 0.15em;
      text-transform: uppercase; cursor: pointer; transition: opacity 0.2s;
    }
    .login-btn:hover { opacity: 0.88; }
    .login-btn:disabled { opacity: 0.5; cursor: default; }

    .login-error {
      color: #e85d5d; font-style: italic; font-size: 0.85rem;
      margin-top: 14px; min-height: 20px;
    }

    /* ── Admin panel ── */
    #adminPanel {
      display: none;
      position: relative; z-index: 1;
      min-height: 100vh;
      padding: 60px 24px 40px;
      max-width: 480px; margin: 0 auto;
    }

    .admin-header { text-align: center; margin-bottom: 48px; }

    .admin-title {
      font-family: 'Cinzel', serif; font-size: 1.5rem; font-weight: 900;
      color: var(--gold); letter-spacing: 0.15em; text-transform: uppercase;
    }

    .admin-user {
      font-style: italic; color: var(--fog); font-size: 0.85rem; margin-top: 6px;
    }

    .divider { display:flex; align-items:center; gap:12px; margin:14px auto; width:260px; }
    .divider-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--brass),transparent); }
    .divider-anchor { font-size:1rem; color:var(--brass); }

    /* ── Alarm buttons ── */
    .alarm-section { display: flex; flex-direction: column; gap: 20px; margin-bottom: 40px; }

    .alarm-btn {
      width: 100%; padding: 32px 24px;
      border: none; border-radius: 4px;
      cursor: pointer; font-family: 'Cinzel', serif;
      font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      transition: all 0.3s ease; position: relative; overflow: hidden;
    }
    .alarm-btn::before {
      content: ''; position: absolute; inset: 0;
      background: rgba(255,255,255,0.08);
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.4s ease;
    }
    .alarm-btn:hover::before { transform: scaleX(1); }
    .alarm-btn:active { transform: scale(0.98); }
    .alarm-btn:disabled { opacity: 0.5; cursor: default; }

    .alarm-btn.open {
      background: linear-gradient(135deg, #1a5c2a, #2a7a40);
      border: 1px solid rgba(60,160,80,0.5);
      color: #b8f0c8;
      box-shadow: 0 8px 30px rgba(40,180,60,0.25);
    }
    .alarm-btn.closed {
      background: linear-gradient(135deg, #5c1a1a, #7a2020);
      border: 1px solid rgba(160,60,60,0.5);
      color: #f0b8b8;
      box-shadow: 0 8px 30px rgba(180,40,40,0.25);
    }

    .alarm-btn .btn-icon  { font-size: 2.5rem; display: block; margin-bottom: 12px; }
    .alarm-btn .btn-title { font-size: 1.1rem; display: block; margin-bottom: 6px; }
    .alarm-btn .btn-sub   {
      font-size: 0.75rem; font-family: 'Crimson Text', serif;
      font-style: italic; font-weight: 400; opacity: 0.75;
      letter-spacing: 0.08em; display: block;
    }

    /* ── Log ── */
    .log-section {
      background: rgba(10,22,40,0.5);
      border: 1px solid rgba(201,147,42,0.15);
      border-radius: 4px; padding: 20px;
    }
    .log-title {
      font-family: 'Cinzel', serif; font-size: 0.8rem;
      letter-spacing: 0.2em; color: var(--brass);
      text-transform: uppercase; margin-bottom: 14px;
    }
    #logEntries {
      list-style: none; display: flex; flex-direction: column;
      gap: 8px; max-height: 200px; overflow-y: auto;
    }
    #logEntries li {
      font-size: 0.85rem; color: var(--fog); font-style: italic;
      padding: 6px 0; border-bottom: 1px solid rgba(201,147,42,0.08);
    }
    .log-open   { color: #5de87a !important; }
    .log-closed { color: #e85d5d !important; }

    /* ── Sending overlay ── */
    .sending-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(6,14,26,0.85); z-index: 200;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
    }
    .sending-overlay.active { display: flex; }
    .sending-spinner {
      width: 50px; height: 50px;
      border: 3px solid rgba(201,147,42,0.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sending-label { font-family: 'Cinzel', serif; color: var(--gold); letter-spacing: 0.2em; font-size: 0.85rem; }

    /* ── Logout ── */
    .logout-btn {
      display: block; margin: 28px auto 0;
      background: transparent;
      border: 1px solid rgba(201,147,42,0.2); border-radius: 3px;
      color: rgba(168,184,200,0.45); font-family: 'Cinzel', serif;
      font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase;
      padding: 10px 20px; cursor: pointer; transition: all 0.3s;
    }
    .logout-btn:hover { color: var(--fog); border-color: rgba(201,147,42,0.4); }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-title">Helm Access</div>
    <div class="login-sub">Administrators only</div>
    <input type="email"    class="login-input" id="emailInput"    placeholder="Email address" />
    <input type="password" class="login-input" id="passwordInput" placeholder="Password"
      onkeydown="if(event.key==='Enter') doLogin()" />
    <button class="login-btn" id="loginBtn" onclick="doLogin()">⚓ &nbsp; Enter</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <div class="admin-header">
    <div class="admin-title">⚓ Helm Control</div>
    <div class="admin-user" id="adminUser"></div>
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-anchor">⚓</span>
      <div class="divider-line"></div>
    </div>
    <div style="font-family:'Cinzel',serif;font-size:0.75rem;color:var(--fog);letter-spacing:0.2em;text-transform:uppercase;">The Jealous Mistress</div>
  </div>

  <div class="alarm-section">
    <button class="alarm-btn open"   onclick="sendAlarm('open')">
      <span class="btn-icon">📯</span>
      <span class="btn-title">Sound the Foghorn</span>
      <span class="btn-sub">Clubhouse is open — all members notified</span>
    </button>
    <button class="alarm-btn closed" onclick="sendAlarm('closed')">
      <span class="btn-icon">🔔</span>
      <span class="btn-title">Ring the Bell</span>
      <span class="btn-sub">Clubhouse is closed — all members notified</span>
    </button>
  </div>

  <div class="log-section">
    <div class="log-title">⚓ Signal Log</div>
    <ul id="logEntries"><li>No signals sent yet this session</li></ul>
  </div>

  <button class="logout-btn" onclick="doLogout()">Leave the Helm</button>
</div>

<div class="sending-overlay" id="sendingOverlay">
  <div class="sending-spinner"></div>
  <div class="sending-label" id="sendingLabel">Sending Signal…</div>
</div>

<script type="module">
  import { initializeApp }                         from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword,
           signOut, onAuthStateChanged }            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, getDocs,
           setDoc, doc, serverTimestamp }           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // 🔧 PASTE YOUR FIREBASE CONFIG BELOW
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const firebaseConfig = {
    apiKey:            "AIzaSyD1i_hWah1vZOUPugh-3AoaGu78aokn_PU",
    authDomain:        "the-jealous-mistress-31e8a.firebaseapp.com",
    projectId:         "the-jealous-mistress-31e8a",
    storageBucket:     "the-jealous-mistress-31e8a.firebasestorage.app",
    messagingSenderId: "327568458075",
    appId:             "1:327568458075:web:14d292c7c7d46536f7da7e"
  };
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  const fbApp = initializeApp(firebaseConfig);
  const auth  = getAuth(fbApp);
  const db    = getFirestore(fbApp);

  // ── Auth state ──
  onAuthStateChanged(auth, user => {
    if (user) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminPanel').style.display  = 'block';
      document.getElementById('adminUser').textContent     = user.email;
    } else {
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('adminPanel').style.display  = 'none';
    }
  });

  // ── Login ──
  window.doLogin = async function () {
    const email    = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const btn      = document.getElementById('loginBtn');
    const errEl    = document.getElementById('loginError');
    errEl.textContent = '';
    btn.disabled = true; btn.textContent = 'Entering…';
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (err) {
      errEl.textContent = 'Incorrect email or password.';
      btn.disabled = false; btn.textContent = '⚓  Enter';
    }
  };

  // ── Logout ──
  window.doLogout = async function () {
    await signOut(auth);
    document.getElementById('emailInput').value    = '';
    document.getElementById('passwordInput').value = '';
  };

  // ── Send alarm ──
  window.sendAlarm = async function (type) {
    const isOpen  = type === 'open';
    const overlay = document.getElementById('sendingOverlay');
    const label   = document.getElementById('sendingLabel');
    overlay.classList.add('active');
    label.textContent = isOpen ? 'Sounding the Foghorn…' : 'Ringing the Bell…';

    try {
      // 1) Update live status — members see this instantly on their screen
      await setDoc(doc(db, "clubhouse", "status"), {
        isOpen,
        updatedAt: serverTimestamp()
      });

      // 2) Get all member FCM tokens
      const snapshot = await getDocs(collection(db, "members"));
      const tokens   = snapshot.docs.map(d => d.data().token).filter(Boolean);

      if (tokens.length === 0) {
        addLog(isOpen, 'Status updated — no members subscribed yet');
        return;
      }

      // 3) Get a fresh auth token for the FCM V1 API
      const idToken = await auth.currentUser.getIdToken();

      const title = isOpen ? "⚓ Clubhouse OPEN"  : "🔔 Clubhouse CLOSED";
      const body  = isOpen
        ? "The Jealous Mistress is open — come aboard!"
        : "The Jealous Mistress is closed for the night.";

      // 4) Send ALL tokens in a single function call
      const response = await fetch("/.netlify/functions/send-notification", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${idToken}`
        },
        body: JSON.stringify({ tokens, title, body, type })
      });

      const result = await response.json();
      const successCount = result.successCount ?? (response.ok ? tokens.length : 0);
      const failCount    = result.failCount    ?? (response.ok ? 0 : tokens.length);

      addLog(isOpen, `Signal sent to ${successCount} member${successCount !== 1 ? 's' : ''}${failCount > 0 ? ` (${failCount} failed)` : ''}`);

    } catch (err) {
      addLog(isOpen, 'Error: ' + err.message);
    } finally {
      overlay.classList.remove('active');
    }
  };

  function addLog(isOpen, detail) {
    const list = document.getElementById('logEntries');
    if (list.children.length === 1 && list.children[0].textContent.includes('No signals')) {
      list.innerHTML = '';
    }
    const li   = document.createElement('li');
    const time = new Intl.DateTimeFormat('en-US', { hour:'numeric', minute:'2-digit', second:'2-digit' }).format(new Date());
    li.textContent = `[${time}] ${isOpen ? 'OPEN' : 'CLOSED'} — ${detail}`;
    li.className   = isOpen ? 'log-open' : 'log-closed';
    list.prepend(li);
  }
</script>

</body>
</html>
